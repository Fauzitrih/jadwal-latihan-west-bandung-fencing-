<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jadwal Latihan West Bandung Fencing</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #667085;
      --line: #d7dde6;
      --surface: #ffffff;
      --soft: #f3f6fa;
      --green: #1f6f8b;
      --green-dark: #174e64;
      --coral: #c7374d;
      --gold: #b7791f;
      --blue: #2c6bed;
      --shadow: 0 18px 45px rgba(26, 38, 58, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(31, 111, 139, 0.13), transparent 34%),
        linear-gradient(315deg, rgba(199, 55, 77, 0.11), transparent 30%),
        #f8fafc;
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
    }

    .sidebar {
      min-height: 100vh;
      padding: 28px;
      background: #111827;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--coral);
      box-shadow: inset 0 -8px 18px rgba(0, 0, 0, 0.18);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: #a7b6c2;
      font-size: 0.82rem;
    }

    .training-visual {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      border: 3px solid rgba(255, 255, 255, 0.30);
      border-radius: 50%;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.18);
      display: grid;
      place-items: center;
      padding: 0;
    }

    .training-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── Real-time Calendar ─── */
    .calendar-widget {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }

    .calendar-live-clock {
      text-align: center;
      margin-bottom: 12px;
    }

    .clock-time {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .clock-date {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 2px;
      font-weight: 500;
    }

    .clock-seconds-bar {
      height: 3px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 8px;
      overflow: hidden;
    }

    .clock-seconds-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #f97316, #ec4899, #8b5cf6);
      transition: width 1s linear;
      will-change: width;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .calendar-header h3 {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .calendar-nav {
      display: flex;
      gap: 4px;
    }

    .calendar-nav button {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      color: #94a3b8;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      font-weight: 700;
      transition: all 150ms ease;
    }

    .calendar-nav button:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      transform: scale(1.06);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .calendar-day-label {
      text-align: center;
      font-size: 0.62rem;
      font-weight: 700;
      color: #64748b;
      padding: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .calendar-cell {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 7px;
      font-size: 0.74rem;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      position: relative;
      transition: all 150ms ease;
    }

    .calendar-cell:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: scale(1.08);
      z-index: 2;
    }

    .calendar-cell.other-month {
      color: #334155;
      cursor: default;
    }

    .calendar-cell.other-month:hover {
      background: transparent;
      transform: none;
    }

    .calendar-cell.current-month {
      color: #cbd5e1;
    }

    .calendar-cell.has-schedule {
      color: #e2e8f0;
      background: rgba(34, 197, 94, 0.12);
    }

    .calendar-cell.has-schedule::after {
      content: '';
      position: absolute;
      bottom: 2px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    .calendar-cell.today {
      background: linear-gradient(135deg, #c7374d, #e11d48);
      color: #fff !important;
      font-weight: 900;
      box-shadow: 0 4px 14px rgba(199, 55, 77, 0.4);
      animation: todayPulse 2s ease-in-out infinite;
    }

    .calendar-cell.today::after {
      background: #fff !important;
    }

    .calendar-cell.selected-date {
      outline: 2px solid #f97316;
      outline-offset: -2px;
    }

    @keyframes todayPulse {
      0%, 100% { box-shadow: 0 4px 14px rgba(199, 55, 77, 0.4); }
      50% { box-shadow: 0 4px 20px rgba(199, 55, 77, 0.65); }
    }

    .calendar-legend {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .calendar-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.64rem;
      color: #64748b;
    }

    .calendar-legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .legend-today {
      background: linear-gradient(135deg, #c7374d, #e11d48);
    }

    .legend-scheduled {
      background: #22c55e;
    }

    .legend-selected {
      width: 6px;
      height: 6px;
      border: 1.5px solid #f97316;
      border-radius: 50%;
      background: transparent;
    }

    /* ─── Summary ─── */
    .summary {
      display: grid;
      gap: 12px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      color: #d6e1e8;
    }

    .summary-row strong {
      color: #fff;
      font-size: 1.35rem;
    }

    .main {
      padding: 28px;
      display: grid;
      gap: 20px;
      align-content: start;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      align-items: end;
    }

    .title h2 {
      margin: 0;
      font-size: clamp(1.55rem, 2.5vw, 2.5rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .title p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 650px;
    }

    .selected-date-banner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.2);
    }

    .selected-date-banner .date-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: var(--coral);
      font-size: 1.3rem;
      font-weight: 900;
      flex: 0 0 48px;
    }

    .selected-date-banner .date-info h3 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
    }

    .selected-date-banner .date-info span {
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .assignment-panel {
      display: grid;
      grid-template-columns: minmax(220px, 1.1fr) minmax(260px, 1.4fr) auto;
      gap: 14px;
      align-items: end;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    label {
      display: grid;
      gap: 7px;
      color: #344054;
      font-size: 0.86rem;
      font-weight: 750;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cfd7e3;
      border-radius: 7px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    .choice-button,
    .clear-button {
      min-height: 42px;
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      transition: transform 150ms ease, background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .choice-button:hover,
    .clear-button:hover {
      transform: translateY(-1px);
    }

    .choice-button {
      padding: 0 18px;
      background: var(--coral);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 12px 22px rgba(223, 98, 76, 0.24);
      white-space: nowrap;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, minmax(145px, 1fr));
      gap: 14px;
      align-items: stretch;
    }

    .coach-card {
      min-height: 330px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 14px 30px rgba(30, 41, 59, 0.07);
    }

    .coach-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      font-weight: 900;
      background: var(--blue);
    }

    .coach-head h3 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .coach-head span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .count {
      width: fit-content;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 10px;
      background: #eef6f8;
      color: var(--green-dark);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .athlete-list {
      min-height: 190px;
      display: grid;
      align-content: start;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .athlete-list li {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 9px;
      border-radius: 7px;
      background: var(--soft);
      color: #273548;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .remove {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      border: 0;
      border-radius: 6px;
      background: #fff;
      color: #a64232;
      cursor: pointer;
      font-weight: 900;
      line-height: 1;
    }

    .empty {
      color: #98a2b3;
      font-size: 0.88rem;
      font-weight: 650;
      padding-top: 8px;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
    }

    .clear-button {
      padding: 0 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: #475467;
      font-weight: 800;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      max-width: min(360px, calc(100vw - 44px));
      padding: 13px 16px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        display: grid;
        grid-template-columns: minmax(220px, 0.8fr) minmax(260px, 1fr) minmax(220px, 0.8fr);
        align-items: center;
      }

      .board {
        grid-template-columns: repeat(3, minmax(180px, 1fr));
      }
    }

    @media (max-width: 820px) {
      .main,
      .sidebar {
        padding: 18px;
      }

      .sidebar,
      .topbar,
      .assignment-panel {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .board {
        grid-template-columns: 1fr;
      }

      .coach-card {
        min-height: 260px;
      }

      .title h2 {
        font-size: 1.48rem;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" aria-label="Ringkasan jadwal">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none">
            <path d="M4 19.5h16" stroke="white" stroke-width="2" stroke-linecap="round" />
            <path d="M7 16.5l10-10" stroke="white" stroke-width="2" stroke-linecap="round" />
            <path d="M9 14.5l-2-2m8-2l2 2" stroke="white" stroke-width="2" stroke-linecap="round" />
            <circle cx="8" cy="15" r="2.6" stroke="white" stroke-width="2" />
          </svg>
        </div>
        <h1>West Bandung Fencing<span>Jadwal latihan</span></h1>
      </div>

      <div class="training-visual" aria-label="Logo West Bandung Fencing">
        <img src="logo.jpg" alt="Logo West Bandung Fencing">
      </div>

      <!-- Real-time Calendar Widget -->
      <div class="calendar-widget" id="calendarWidget">
        <div class="calendar-live-clock">
          <div class="clock-time" id="clockTime">00:00:00</div>
          <div class="clock-date" id="clockDate">Memuat...</div>
          <div class="clock-seconds-bar">
            <div class="clock-seconds-fill" id="clockSecondsFill"></div>
          </div>
        </div>

        <div class="calendar-header">
          <div class="calendar-nav">
            <button type="button" id="calPrev" aria-label="Bulan sebelumnya">◀</button>
          </div>
          <h3 id="calMonthYear">Juni 2026</h3>
          <div class="calendar-nav">
            <button type="button" id="calToday" aria-label="Hari ini" style="font-size:0.65rem;width:auto;padding:0 7px;">Hari Ini</button>
            <button type="button" id="calNext" aria-label="Bulan berikutnya">▶</button>
          </div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="calendar-legend">
          <div class="calendar-legend-item">
            <div class="calendar-legend-dot legend-today"></div>
            Hari ini
          </div>
          <div class="calendar-legend-item">
            <div class="calendar-legend-dot legend-scheduled"></div>
            Ada jadwal
          </div>
          <div class="calendar-legend-item">
            <div class="calendar-legend-dot legend-selected"></div>
            Dipilih
          </div>
        </div>
      </div>

      <div class="summary">
        <div class="summary-row"><span>Total atlet</span><strong id="totalAthletes">0</strong></div>
        <div class="summary-row"><span>Coach aktif</span><strong id="activeCoaches">0</strong></div>
        <div class="summary-row"><span>Tanggal dipilih</span><strong id="selectedDateLabel">-</strong></div>
      </div>
    </aside>

    <main class="main">
      <section class="topbar">
        <div class="title">
          <h2>Jadwal latihan West Bandung Fencing</h2>
          <p>Silahkan pilih tanggal di kalender, lalu pilih Coach Untuk Lesson</p>
        </div>

        <div class="selected-date-banner" id="dateBanner">
          <div class="date-icon" id="dateBannerDay">-</div>
          <div class="date-info">
            <h3 id="dateBannerFull">Pilih tanggal di kalender</h3>
          </div>
        </div>
      </section>

      <section class="assignment-panel" aria-label="Form pilihan coach">
        <label>
          Nama atlet
          <input id="athleteName" type="text" autocomplete="off" placeholder="Contoh: Dimas">
        </label>
        <label>
          Coach
          <select id="coachSelect"></select>
        </label>
        <button class="choice-button" type="button" id="addChoice">Pilih Coach</button>
      </section>

      <section class="board" id="coachBoard" aria-live="polite"></section>

      <div class="footer-actions">
        <button class="clear-button" type="button" id="clearDay">Kosongkan Tanggal Ini</button>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Konfigurasi dari Firebase Console Anda
    const firebaseConfig = {
      apiKey: "AIzaSyA_y9qdU0Q_xsHXxrFYSd03HvZs-T6Vi08",
      authDomain: "jadwal-latihan-west-bandung-fe.firebaseapp.com",
      projectId: "jadwal-latihan-west-bandung-fe",
      storageBucket: "jadwal-latihan-west-bandung-fe.firebasestorage.app",
      messagingSenderId: "606105147355",
      appId: "1:606105147355:web:a8d567b38719e4df5139fe",
      measurementId: "G-1E25PY4P44",
      databaseURL: "https://jadwal-latihan-west-bandung-fe-default-rtdb.asia-southeast1.firebasedatabase.app" // Menyesuaikan dengan server Asia jika Anda buat di SG
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'jadwal');
    
    const coaches = [
      { id: "coach-1", name: "Coach Derry", focus: "Epee", color: "#2c6bed" },
      { id: "coach-2", name: "Coach Fauzi", focus: "Foil", color: "#1f6f8b" },
      { id: "coach-3", name: "Coach dinar", focus: "Foil", color: "#c7374d" },
      { id: "coach-4", name: "Coach rindhi", focus: "Sabre", color: "#b7791f" },
      { id: "coach-5", name: "Coach Agnes", focus: "Sabre", color: "#7c3aed" },
      { id: "coach-6", name: "Coach Putri", focus: "Epee", color: "#2563eb" },
      { id: "coach-7", name: "Coach Nasya", focus: "Epee", color: "#be185d" }
    ];

    const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const monthNames = [
      "Januari", "Februari", "Maret", "April", "Mei", "Juni",
      "Juli", "Agustus", "September", "Oktober", "November", "Desember"
    ];

    // Current selected date key, e.g. "2026-06-24"
    let currentDateKey = formatDateKey(new Date());
    let schedule = {};

    // ─── FIREBASE REALTIME LISTENER ───
    onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      schedule = data || {};
      renderBoard();
      renderCalendar();
    });

    // Calendar view state
    let calViewDate = new Date();

    // DOM references
    const board = document.querySelector("#coachBoard");
    const athleteInput = document.querySelector("#athleteName");
    const coachSelect = document.querySelector("#coachSelect");
    const totalAthletesEl = document.querySelector("#totalAthletes");
    const activeCoachesEl = document.querySelector("#activeCoaches");
    const selectedDateLabel = document.querySelector("#selectedDateLabel");
    const toast = document.querySelector("#toast");
    const clockTime = document.querySelector("#clockTime");
    const clockDate = document.querySelector("#clockDate");
    const clockSecondsFill = document.querySelector("#clockSecondsFill");
    const calMonthYear = document.querySelector("#calMonthYear");
    const calendarGrid = document.querySelector("#calendarGrid");
    const dateBannerDay = document.querySelector("#dateBannerDay");
    const dateBannerFull = document.querySelector("#dateBannerFull");

    // ─── Utilities ───
    function formatDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseDateKey(key) {
      const [y, m, d] = key.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDateLong(date) {
      return `${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
    }

    function formatDateShort(date) {
      return `${date.getDate()}/${date.getMonth() + 1}`;
    }

    // ─── Schedule Functions ───
    function saveSchedule() {
      // Bersihkan jadwal yang kosong
      const cleaned = {};
      for (const [dateKey, coachData] of Object.entries(schedule)) {
        const hasAthletes = coaches.some(c => (coachData[c.id] || []).length > 0);
        if (hasAthletes) cleaned[dateKey] = coachData;
      }
      schedule = cleaned;
      
      // Simpan ke Firebase
      set(dbRef, schedule).catch((error) => {
        console.error("Gagal menyimpan ke Firebase:", error);
        showToast("Error koneksi database");
      });
    }

    function getDateSchedule(dateKey) {
      if (!schedule[dateKey]) schedule[dateKey] = {};
      return schedule[dateKey];
    }

    function hasAthletesForDate(dateKey) {
      const dateSchedule = schedule[dateKey];
      if (!dateSchedule) return false;
      return coaches.some(c => (dateSchedule[c.id] || []).length > 0);
    }

    // ─── Render Functions ───
    function renderCoachOptions() {
      coachSelect.innerHTML = coaches
        .map((coach) => `<option value="${coach.id}">${coach.name} - ${coach.focus}</option>`)
        .join("");
    }

    function renderDateBanner() {
      const date = parseDateKey(currentDateKey);
      const dayName = dayNames[date.getDay()];
      dateBannerDay.textContent = date.getDate();
      dateBannerFull.textContent = `${dayName}, ${formatDateLong(date)}`;

      selectedDateLabel.textContent = formatDateShort(date);
    }

    function renderBoard() {
      const dateSchedule = getDateSchedule(currentDateKey);
      board.innerHTML = coaches.map((coach) => {
        const athletes = dateSchedule[coach.id] || [];
        const initials = coach.name.split(" ").slice(-1)[0].slice(0, 2).toUpperCase();
        const athleteList = athletes.length
          ? athletes.map((athlete, index) => `
              <li>
                <span>${escapeHtml(athlete)}</span>
                <button class="remove" type="button" data-remove="${coach.id}:${index}" aria-label="Hapus ${escapeHtml(athlete)}">x</button>
              </li>
            `).join("")
          : `<div class="empty">Belum ada atlet</div>`;

        return `
          <article class="coach-card">
            <div class="coach-head">
              <div class="avatar" style="background:${coach.color}">${initials}</div>
              <div>
                <h3>${coach.name}</h3>
                <span>${coach.focus}</span>
              </div>
            </div>
            <div class="count">${athletes.length} atlet</div>
            <ul class="athlete-list">${athleteList}</ul>
          </article>
        `;
      }).join("");
      renderSummary();
    }

    function renderSummary() {
      const dateSchedule = getDateSchedule(currentDateKey);
      const counts = coaches.map((coach) => (dateSchedule[coach.id] || []).length);
      totalAthletesEl.textContent = counts.reduce((sum, count) => sum + count, 0);
      activeCoachesEl.textContent = counts.filter(Boolean).length;
    }

    // ─── Actions ───
    function addChoice() {
      const athlete = athleteInput.value.trim().replace(/\s+/g, " ");
      const coachId = coachSelect.value;
      if (!athlete) {
        showToast("Nama atlet perlu diisi dulu.");
        athleteInput.focus();
        return;
      }

      const dateSchedule = getDateSchedule(currentDateKey);

      // Remove from any other coach on this date
      coaches.forEach((coach) => {
        dateSchedule[coach.id] = (dateSchedule[coach.id] || [])
          .filter((name) => name.toLowerCase() !== athlete.toLowerCase());
      });

      dateSchedule[coachId] = [...(dateSchedule[coachId] || []), athlete];
      saveSchedule();
      renderBoard();
      renderCalendar();
      athleteInput.value = "";
      athleteInput.focus();

      const date = parseDateKey(currentDateKey);
      showToast(`${athlete} masuk jadwal ${formatDateLong(date)}.`);
    }

    function removeAthlete(coachId, index) {
      const dateSchedule = getDateSchedule(currentDateKey);
      dateSchedule[coachId].splice(index, 1);
      saveSchedule();
      renderBoard();
      renderCalendar();
      showToast("Atlet dihapus dari jadwal tanggal ini.");
    }

    function clearCurrentDate() {
      if (!hasAthletesForDate(currentDateKey)) {
        showToast("Jadwal tanggal ini masih kosong.");
        return;
      }
      delete schedule[currentDateKey];
      saveSchedule();
      renderBoard();
      renderCalendar();
      const date = parseDateKey(currentDateKey);
      showToast(`Jadwal ${formatDateLong(date)} dikosongkan.`);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    // ─── Real-time Clock ───
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      clockTime.textContent = `${h}:${m}:${s}`;

      const dayName = dayNames[now.getDay()];
      clockDate.textContent = `${dayName}, ${formatDateLong(now)}`;

      const pct = ((now.getSeconds() + now.getMilliseconds() / 1000) / 60) * 100;
      clockSecondsFill.style.width = `${pct}%`;
    }

    // ─── Calendar ───
    function renderCalendar() {
      const now = new Date();
      const viewYear = calViewDate.getFullYear();
      const viewMonth = calViewDate.getMonth();

      calMonthYear.textContent = `${monthNames[viewMonth]} ${viewYear}`;

      const firstDay = new Date(viewYear, viewMonth, 1);
      const lastDay = new Date(viewYear, viewMonth + 1, 0);
      const startDayOfWeek = firstDay.getDay();

      let html = "";

      // Monday-first headers
      const mondayFirst = ["Sen", "Sel", "Rab", "Kam", "Jum", "Sab", "Min"];
      for (let i = 0; i < 7; i++) {
        html += `<div class="calendar-day-label">${mondayFirst[i]}</div>`;
      }

      // Monday-first offset
      const offset = (startDayOfWeek + 6) % 7;

      // Previous month
      const prevMonthLast = new Date(viewYear, viewMonth, 0);
      for (let i = offset - 1; i >= 0; i--) {
        const d = prevMonthLast.getDate() - i;
        html += `<div class="calendar-cell other-month">${d}</div>`;
      }

      // Current month days
      const totalDays = lastDay.getDate();
      const todayKey = formatDateKey(now);

      for (let d = 1; d <= totalDays; d++) {
        const dateKey = formatDateKey(new Date(viewYear, viewMonth, d));
        const isToday = dateKey === todayKey;
        const hasSchedule = hasAthletesForDate(dateKey);
        const isSelected = dateKey === currentDateKey;

        let classes = "calendar-cell current-month";
        if (isToday) classes += " today";
        if (hasSchedule) classes += " has-schedule";
        if (isSelected) classes += " selected-date";

        html += `<div class="${classes}" data-date-key="${dateKey}">${d}</div>`;
      }

      // Fill remaining cells
      const totalCells = offset + totalDays;
      const remaining = (7 - (totalCells % 7)) % 7;
      for (let d = 1; d <= remaining; d++) {
        html += `<div class="calendar-cell other-month">${d}</div>`;
      }

      calendarGrid.innerHTML = html;
    }

    // ─── Select Date ───
    function selectDate(dateKey) {
      currentDateKey = dateKey;
      renderDateBanner();
      renderBoard();
      renderCalendar();
      const date = parseDateKey(dateKey);
      showToast(`Beralih ke ${dayNames[date.getDay()]}, ${formatDateLong(date)}`);
    }

    // ─── Event Listeners ───
    document.querySelector("#addChoice").addEventListener("click", addChoice);
    document.querySelector("#clearDay").addEventListener("click", clearCurrentDate);
    athleteInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addChoice();
    });
    board.addEventListener("click", (event) => {
      const target = event.target.closest("[data-remove]");
      if (!target) return;
      const [coachId, index] = target.dataset.remove.split(":");
      removeAthlete(coachId, Number(index));
    });

    // Calendar navigation
    document.querySelector("#calPrev").addEventListener("click", () => {
      calViewDate.setMonth(calViewDate.getMonth() - 1);
      renderCalendar();
    });
    document.querySelector("#calNext").addEventListener("click", () => {
      calViewDate.setMonth(calViewDate.getMonth() + 1);
      renderCalendar();
    });
    document.querySelector("#calToday").addEventListener("click", () => {
      calViewDate = new Date();
      selectDate(formatDateKey(new Date()));
    });

    // Click on calendar dates
    calendarGrid.addEventListener("click", (event) => {
      const cell = event.target.closest("[data-date-key]");
      if (!cell) return;
      selectDate(cell.dataset.dateKey);
    });

    // ─── Initialize ───
    renderCoachOptions();
    renderDateBanner();
    renderBoard();
    renderCalendar();
    updateClock();
    setInterval(updateClock, 1000);

    // Refresh calendar at midnight
    (function scheduleCalendarRefresh() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      setTimeout(() => {
        renderCalendar();
        setInterval(renderCalendar, 24 * 60 * 60 * 1000);
      }, midnight - now);
    })();
  </script>
</body>

</html>
